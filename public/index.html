<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mini Insta</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  font-family: Arial, sans-serif;
  height: 100%;
  overflow: hidden;
}

.app {
  width: 100%;
  max-width: 420px;
  height: 100vh;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  background: black;
  overflow: hidden;
}

header {
  height: 50px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 10px;
  background: rgba(0,0,0,0.95);
  color: white;
  border-bottom: 1px solid #222;
}

.title { font-weight: bold; }

.btns { display: flex; gap: 6px; }

button {
  background: #ff2d55;
  border: none;
  color: white;
  padding: 6px 8px;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
}

.video-container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: black;
}

#modal {
  position: fixed;
  top: 60px;
  right: 10px;
  width: 280px;
  background: #111;
  border: 1px solid #333;
  border-radius: 10px;
  padding: 10px;
  display: none;
  z-index: 20;
  color: white;
  max-height: 350px;
  overflow: hidden;
}

.list {
  max-height: 250px;
  overflow-y: auto;
}

.item {
  padding: 8px;
  background: #222;
  margin-bottom: 6px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

.delete {
  color: red;
  font-size: 11px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="app">

<header>
  <div class="title">Mini Insta</div>
  <div class="btns">
    <button onclick="toggleLibrary()">Library</button>
    <button onclick="randomVideo()">Random</button>
    <button onclick="uploadVideo()">Upload</button>
    <input type="file" id="fileInput" accept="video/*" hidden />
  </div>
</header>

<div class="video-container">
  <video id="videoPlayer" playsinline></video>
</div>

</div>

<div id="modal"></div>

<script>
let db = null;
let activeFolder = 0;
let currentIndex = 0;

const video = document.getElementById("videoPlayer");
const modal = document.getElementById("modal");
const fileInput = document.getElementById("fileInput");

/* ---------- LOAD ---------- */
async function loadDB() {
  db = await fetch("/api/db").then(r => r.json());
  render();
}

/* ---------- PLAY ---------- */
function play(i) {
  const vids = db.folders[activeFolder].videos;
  if (!vids.length) return;

  currentIndex = i;

  video.src = vids[i].src;
  video.play();

  preload(i + 1);
}

/* ---------- RANDOM (RESTORED) ---------- */
function randomVideo() {
  const vids = db.folders[activeFolder].videos;
  if (!vids.length) return;

  const i = Math.floor(Math.random() * vids.length);
  play(i);
}

/* ---------- PRELOAD NEXT ---------- */
function preload(i) {
  const vids = db.folders[activeFolder].videos;
  if (!vids.length) return;

  const next = i % vids.length;

  const temp = document.createElement("video");
  temp.src = vids[next].src;
  temp.preload = "auto";
}

/* ---------- LOOP ---------- */
video.addEventListener("ended", () => {
  const vids = db.folders[activeFolder].videos;
  if (!vids.length) return;

  play((currentIndex + 1) % vids.length);
});

/* ---------- UI ---------- */
function toggleLibrary() {
  modal.style.display = modal.style.display === "block" ? "none" : "block";
  render();
}

/* ---------- UPLOAD ---------- */
function uploadVideo() {
  fileInput.click();
}

fileInput.onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const form = new FormData();
  form.append("video", file);
  form.append("folderIndex", activeFolder);

  await fetch("/api/upload", {
    method: "POST",
    body: form
  });

  loadDB();
};

/* ---------- DELETE ---------- */
async function del(i) {
  await fetch("/api/delete", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      folderIndex: activeFolder,
      videoIndex: i
    })
  });

  loadDB();
}

/* ---------- RENDER ---------- */
function render() {
  if (!db) return;

  const folder = db.folders[activeFolder];

  modal.innerHTML = `
    <h3>Videos</h3>

    <div class="list">
      ${
        folder.videos.length
        ? folder.videos.map((v,i)=>`
          <div class="item" onclick="play(${i})">
            <div>${v.number}. ${v.name}</div>
            <div class="delete" onclick="event.stopPropagation(); del(${i})">X</div>
          </div>
        `).join("")
        : "<div class='item'>No videos</div>"
      }
    </div>
  `;
}

loadDB();
</script>

</body>
</html>
